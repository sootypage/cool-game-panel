<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Network Status</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#07101f;
      --panel:#0d1a33;
      --panel2:#101f3d;
      --line:#1e3a66;
      --text:#ffffff;
      --muted:#a9bbd9;
      --green:#4ade80;
      --red:#fb7185;
      --blue:#60a5fa;
      --gold:#fbbf24;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.16), transparent 24%),
        radial-gradient(circle at top right, rgba(34,197,94,.08), transparent 22%),
        var(--bg);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 24px;
      background:rgba(10,18,35,.95);
      border-bottom:1px solid #1b2c4f;
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:blur(10px);
    }

    .brand{
      font-size:24px;
      font-weight:700;
    }

    .nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .nav button{
      background:#2563eb;
      color:#fff;
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
    }

    .nav button.secondary{
      background:#1e293b;
    }

    .container{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }

    .hero{
      background:linear-gradient(180deg, rgba(14,28,56,.95), rgba(11,23,45,.95));
      border:1px solid var(--line);
      border-radius:20px;
      padding:24px;
      margin-bottom:20px;
      box-shadow:0 18px 50px rgba(0,0,0,.25);
    }

    .hero h1{
      margin:0 0 8px 0;
      font-size:34px;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:15px;
    }

    .overview-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-top:20px;
    }

    .overview-card{
      background:rgba(15,29,56,.95);
      border:1px solid #223b68;
      border-radius:18px;
      padding:18px;
    }

    .overview-card .label{
      color:var(--muted);
      font-size:14px;
      margin-bottom:8px;
    }

    .overview-card .value{
      font-size:30px;
      font-weight:700;
    }

    .nodes{
      display:grid;
      gap:18px;
      margin-top:22px;
    }

    .node-card{
      background:linear-gradient(180deg, rgba(12,25,49,.98), rgba(10,20,39,.98));
      border:1px solid #18335e;
      border-radius:22px;
      padding:18px;
      box-shadow:0 14px 40px rgba(0,0,0,.20);
    }

    .node-top{
      display:grid;
      grid-template-columns:1.4fr 1fr;
      gap:18px;
      align-items:start;
    }

    .node-head{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .uptime-pill{
      min-width:68px;
      text-align:center;
      padding:10px 12px;
      border-radius:999px;
      font-weight:700;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);
    }

    .uptime-good{
      color:#b9ffd0;
      border-color:rgba(74,222,128,.35);
      background:rgba(74,222,128,.10);
    }

    .uptime-bad{
      color:#ffd0da;
      border-color:rgba(251,113,133,.35);
      background:rgba(251,113,133,.10);
    }

    .node-title{
      font-size:31px;
      font-weight:700;
      margin:0;
    }

    .node-sub{
      color:var(--blue);
      margin:8px 0 12px 0;
      font-size:15px;
    }

    .tag-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .tag{
      padding:9px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      font-size:14px;
      font-weight:700;
      background:rgba(255,255,255,.03);
    }

    .tag.online{
      color:#c8ffe0;
      border-color:rgba(74,222,128,.32);
      background:rgba(74,222,128,.10);
    }

    .tag.offline{
      color:#ffd5dc;
      border-color:rgba(251,113,133,.32);
      background:rgba(251,113,133,.10);
    }

    .tag.blue{
      color:#d8e8ff;
      border-color:rgba(96,165,250,.30);
      background:rgba(96,165,250,.10);
    }

    .tag.gold{
      color:#ffe7a4;
      border-color:rgba(251,191,36,.30);
      background:rgba(251,191,36,.10);
    }

    .spark-wrap{
      padding-top:10px;
    }

    .spark{
      display:flex;
      align-items:flex-end;
      gap:5px;
      height:48px;
      margin-bottom:10px;
    }

    .spark span{
      display:block;
      width:6px;
      border-radius:6px;
      background:var(--green);
      opacity:.95;
    }

    .spark.offline span{
      background:var(--red);
    }

    .spark-labels{
      display:flex;
      justify-content:space-between;
      color:var(--muted);
      font-size:14px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-top:16px;
    }

    .stat-box{
      background:rgba(16,31,61,.95);
      border:1px solid #223b68;
      border-radius:18px;
      padding:18px;
    }

    .stat-box .big{
      font-size:20px;
      font-weight:700;
      margin-bottom:8px;
    }

    .stat-box .small{
      color:var(--muted);
      font-size:14px;
    }

    .healthy{
      color:#ffffff;
      font-weight:700;
    }

    .good{
      color:var(--green);
      font-weight:700;
    }

    .bad{
      color:var(--red);
      font-weight:700;
    }

    .footer-note{
      margin-top:20px;
      color:var(--muted);
      font-size:14px;
      text-align:center;
    }

    @media (max-width: 1100px){
      .overview-grid,
      .stats-grid{
        grid-template-columns:repeat(2,1fr);
      }
      .node-top{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 700px){
      .overview-grid,
      .stats-grid{
        grid-template-columns:1fr;
      }
      .node-title{
        font-size:24px;
      }
      .hero h1{
        font-size:28px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Outback Status</div>
    <div class="nav">
      <button class="secondary" onclick="location.href='index.html'">Main Page</button>
      <button onclick="window.location.reload()">Refresh</button>
    </div>
  </div>

  <div class="container">
    <div class="hero">
      <h1>Network Status</h1>
      <p>This page is public and can be viewed by anyone.</p>

      <div class="overview-grid">
        <div class="overview-card">
          <div class="label">Panel Status</div>
          <div class="value good" id="panelStatus">Online</div>
        </div>
        <div class="overview-card">
          <div class="label">Website Status</div>
          <div class="value" id="websiteStatus">Unknown</div>
        </div>
        <div class="overview-card">
          <div class="label">Nodes</div>
          <div class="value" id="nodeCount">0</div>
        </div>
        <div class="overview-card">
          <div class="label">Online Nodes</div>
          <div class="value" id="onlineNodeCount">0</div>
        </div>
      </div>
    </div>

    <div id="nodesList" class="nodes"></div>

    <div class="footer-note">
      Public status page • auto-refreshes every 30 seconds
    </div>
  </div>

  <script>
    async function getJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('Request failed');
      return res.json();
    }

    function makeSparkline(online) {
      let bars = '';
      for (let i = 0; i < 40; i++) {
        const h = online ? 18 + (i % 3) * 2 : 18 + (i % 2) * 2;
        bars += `<span style="height:${h}px"></span>`;
      }
      return `<div class="spark ${online ? '' : 'offline'}">${bars}</div>`;
    }

    function renderNodeCard(node, online) {
      const uptimeText = online ? '100.00%' : '0.00%';
      const stateText = online ? 'Healthy' : 'Offline';
      const stateClass = online ? 'good' : 'bad';
      const activeTunnels = node.activeTunnels || 0;
      const bandwidth = node.bandwidthUsed || '0 B';
      const ip = node.ip || node.nodeIp || 'Unknown';
      const port = node.port || node.nodePort || '4110';
      const lastSeen = node.lastSeen || new Date().toISOString();

      return `
        <div class="node-card">
          <div class="node-top">
            <div>
              <div class="node-head">
                <div class="uptime-pill ${online ? 'uptime-good' : 'uptime-bad'}">${uptimeText}</div>
                <div class="node-title">${node.name || node.nodeName || 'Unnamed Node'}</div>
              </div>

              <div class="node-sub">${ip} | port ${port} | last seen ${lastSeen}</div>

              <div class="tag-row">
                <div class="tag ${online ? 'online' : 'offline'}">${online ? 'Online' : 'Offline'}</div>
                <div class="tag blue">${activeTunnels} active tunnels</div>
                <div class="tag gold">${node.games || 'minecraft-java, minecraft-bedrock, rust, satisfactory'}</div>
              </div>
            </div>

            <div class="spark-wrap">
              ${makeSparkline(online)}
              <div class="spark-labels">
                <span>2h ago</span>
                <span>now</span>
              </div>
            </div>
          </div>

          <div class="stats-grid">
            <div class="stat-box">
              <div class="big">${activeTunnels}</div>
              <div class="small">Active tunnels</div>
            </div>
            <div class="stat-box">
              <div class="big">${bandwidth}</div>
              <div class="small">Bandwidth used</div>
            </div>
            <div class="stat-box">
              <div class="big ${stateClass}">${stateText}</div>
              <div class="small">Current state</div>
            </div>
            <div class="stat-box">
              <div class="big ${stateClass}">${uptimeText}</div>
              <div class="small">Recent uptime</div>
            </div>
          </div>
        </div>
      `;
    }

    async function loadPublicStatus() {
      const nodesList = document.getElementById('nodesList');
      const panelStatus = document.getElementById('panelStatus');
      const websiteStatus = document.getElementById('websiteStatus');
      const nodeCount = document.getElementById('nodeCount');
      const onlineNodeCount = document.getElementById('onlineNodeCount');

      panelStatus.textContent = 'Online';
      panelStatus.className = 'value good';

      let websiteOk = false;
      let nodes = [];

      try {
        const statusData = await getJson('/api/public/status');
        websiteOk = !!statusData.websiteOnline;
        nodes = Array.isArray(statusData.nodes) ? statusData.nodes : [];
      } catch {
        websiteStatus.textContent = 'Unknown';
        websiteStatus.className = 'value';
        nodesList.innerHTML = `
          <div class="node-card">
            <div class="node-title">Could not load public status</div>
            <div class="node-sub">Make sure your backend has /api/public/status</div>
          </div>
        `;
        return;
      }

      websiteStatus.textContent = websiteOk ? 'Online' : 'Offline';
      websiteStatus.className = 'value ' + (websiteOk ? 'good' : 'bad');

      nodeCount.textContent = String(nodes.length);

      const onlineNodes = nodes.filter(n => n.online);
      onlineNodeCount.textContent = String(onlineNodes.length);

      if (!nodes.length) {
        nodesList.innerHTML = `
          <div class="node-card">
            <div class="node-title">No public nodes found</div>
            <div class="node-sub">Add nodes to your panel or return public data from the backend.</div>
          </div>
        `;
        return;
      }

      nodesList.innerHTML = nodes.map(node => renderNodeCard(node, !!node.online)).join('');
    }

    loadPublicStatus();
    setInterval(loadPublicStatus, 30000);
  </script>
</body>
</html>
