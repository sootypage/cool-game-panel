<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nodes - V9 Panel</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0b1220; color: #fff; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: #111a2e; border-bottom: 1px solid #1f2a44; position: sticky; top: 0; z-index: 10; }
    .brand { font-size: 24px; font-weight: bold; }
    .nav { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav button { background: #2563eb; color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; }
    .nav button.red { background: #ef4444; }
    .nav button.secondary { background: #1e293b; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .card { background: #16213e; padding: 22px; border-radius: 16px; border: 1px solid #243250; }
    .input { width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 14px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; }
    .btn { background: #3b82f6; color: white; border: none; padding: 12px 16px; border-radius: 10px; cursor: pointer; }
    .server-list { display: grid; gap: 14px; margin-top: 16px; }
    .server-item { background: #0f172a; border: 1px solid #2c3b5b; border-radius: 12px; padding: 16px; }
    .message { margin-top: 10px; padding: 12px; border-radius: 10px; background: #0f172a; border: 1px solid #2c3b5b; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">V9 Panel</div>
    <div class="nav">
      <button class="secondary" onclick="location.href='index.html'">Main Page</button>
      <button id="navDashboard" class="hidden" onclick="location.href='dashboard.html'">Dashboard</button>
      <button id="navCreate" class="hidden" onclick="location.href='create.html'">Create Server</button>
      <button id="navStatus" class="hidden" onclick="location.href='status.html'">Status</button>
      <button id="navNodes" class="hidden" onclick="location.href='nodes.html'">Nodes</button>
      <button id="navAdmin" class="hidden" onclick="location.href='admin.html'">Admin</button>
      <button id="navLogout" class="hidden red" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2>Nodes</h2>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div>
          <label>Node Name</label>
          <input id="nodeName" class="input" placeholder="Node 1" />

          <label>Node IP / Hostname</label>
          <input id="nodeIp" class="input" placeholder="123.123.123.123" />

          <label>Description</label>
          <input id="nodeDescription" class="input" placeholder="Main VPS node" />

          <label>Port (optional)</label>
          <input id="nodePort" class="input" placeholder="4110" />

          <label>Node API Key (optional)</label>
          <input id="nodeApiKey" class="input" placeholder="node-api-key" />

          <button class="btn" onclick="addNode()">Add Node</button>
          <div id="nodeMessage" class="message hidden"></div>
        </div>

        <div>
          <h3>Saved Nodes</h3>
          <div id="nodeList" class="server-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    loadSavedLogin();
    if (!loggedInUser) { window.location = 'index.html'; }
    else if (loggedInUser.role !== 'admin') { window.location = 'dashboard.html'; }
    else { loadNodes(); }
  </script>
</body>
</html>
